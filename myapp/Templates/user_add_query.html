{% extends 'base.html' %}
{% load static %}

{% block title %}Raise Query{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/user_add_query.css' %}">
{% endblock %}

{% block content %}
<div class="raise-query-wrapper">

    <div class="page-top-bar">
        <a href="{% url 'user_dashboard' %}" class="back-btn">← Back to Dashboard</a>
    </div>

    <div class="query-card">
        <h2>Raise a New Query</h2>
        <p class="subtitle">Please provide detailed information so we can assist you faster.</p>

        <form method="POST" enctype="multipart/form-data" class="query-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="department">Select Department</label>
                <select name="department_id" id="department" required>
                    <option value="" disabled selected>Select Department</option>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="question">Your Question</label>
                <textarea 
                    name="question"
                    id="question"
                    placeholder="Describe your issue clearly..."
                    required></textarea>
            </div>

            <div class="form-group">
                <label for="attachment">Attach Screenshot (Optional)</label>
                <input type="file" name="attachment" id="attachment">
            </div>

            <button type="submit" class="btn-submit">
                Submit Query
            </button>
        </form>
    </div>

</div>
{% endblock %}
